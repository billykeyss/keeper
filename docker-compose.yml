services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: fl
      POSTGRES_PASSWORD: fl
      POSTGRES_DB: fishing_law
    ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fl -d fishing_law"]
      interval: 2s
      timeout: 5s
      retries: 20
